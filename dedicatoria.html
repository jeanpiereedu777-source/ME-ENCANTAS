<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PARA YOU</title>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body{
      margin:0; min-height:100vh;
      display:flex; align-items:center; justify-content:center;
      font-family:'Baloo 2', sans-serif;
      background: linear-gradient(135deg,#ff9ecb,#cdb6ff);
      color:white; text-align:center;
      padding:24px;
    }
    .card{
      width:min(820px, 94vw);
      background: rgba(255,255,255,.14);
      border:1px solid rgba(255,255,255,.22);
      border-radius:26px;
      padding:24px;
      backdrop-filter: blur(14px);
      box-shadow:0 20px 60px rgba(0,0,0,.25);
    }
    h1{margin:0 0 8px; font-size:34px;}
    p{margin:8px 0 18px; color: rgba(255,255,255,.88); font-size:16px; line-height:1.5;}

    .videoFrame{
      width:100%;
      aspect-ratio: 16 / 9;
      border-radius:18px;
      overflow:hidden;
      border: 1px solid rgba(255,255,255,.18);
      box-shadow: 0 18px 50px rgba(0,0,0,.25);
      background: rgba(0,0,0,.18);
    }
    video{
      width:100%;
      height:100%;
      object-fit: cover;
      display:block;
    }

    .back{
      display:inline-block;
      margin-top:16px;
      padding:12px 18px;
      border-radius:999px;
      background: rgba(255,255,255,.18);
      border: 1px solid rgba(255,255,255,.22);
      color:white;
      text-decoration:none;
      font-weight:800;
      transition:.2s;
    }
    .back:hover{ transform: scale(1.03); }
  </style>
</head>

<body>
  <div class="card">
    <h1>Te la dedicoo hermosa</h1>
    <p>Cuando la escuches… acuérdate de mí y agranda si quieresss </p>

    <div class="videoFrame">
      <video controls preload="metadata">
        <source src="para-ti.mp4" type="video/mp4">
        Tu navegador no soporta video.
      </video>
    </div>

    <a class="back" href="index2.html">← Volver</a>
  </div>
</body>
</html>
